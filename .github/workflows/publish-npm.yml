name: Publish npm

on:
  workflow_call:
    inputs:
      plan:
        description: Dist release plan JSON payload
        required: true
        type: string

permissions:
  contents: none
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    env:
      PLAN: ${{ inputs.plan }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm i -g npm@latest
      - name: Download npm package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ github.ref_name }}-npm-package.tgz
          path: ./npm
      - name: Publish npm package
        working-directory: npm
        run: |
          set -euo pipefail
          tarball=$(find . -maxdepth 1 -name '*.tgz' -print | head -n1 || true)
          if [ -z "${tarball}" ]; then
            echo "No tarball (*.tgz) found in $(pwd)"
            ls -la
            exit 1
          fi
          echo "Publishing ${tarball}"
          IS_PRERELEASE=$(echo "$PLAN" | jq -r '.announcement_is_prerelease')
          tag_args=()
          if [ "$IS_PRERELEASE" = "true" ]; then
            tag_args=(--tag alpha)
          fi
          npm publish --access public --provenance "${tag_args[@]}" "${tarball}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
