name: Publish VSCode Extension

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: Publish to VSCode Marketplace
        required: true
        type: boolean
        default: true
      publish_ovsx:
        description: Publish to Open VSX
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish-marketplace:
    if: github.event_name == 'push' || inputs.publish_marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node
      - run: pnpm --filter jjpwrgem-vscode run vsce:pack
      - run: pnpm --filter jjpwrgem-vscode run vsce:publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-ovsx:
    if: github.event_name == 'push' || inputs.publish_ovsx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node
      - run: pnpm --filter jjpwrgem-vscode run vsce:pack
      - run: pnpm --filter jjpwrgem-vscode run ovsx:publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
