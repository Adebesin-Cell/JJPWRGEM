name: Renovate

on:
  schedule:
    - cron: "0 */3 * * 2,3"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RENOVATE_VERSION: 43.240.0 # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions: {}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
          persist-credentials: false

      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["mise"]'
          RENOVATE_CUSTOM_ENV_VARIABLES: '{"MISE_YES":"1"}' # autotrust mise config in subprocesses
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          renovate-version: ${{ env.RENOVATE_VERSION }}
