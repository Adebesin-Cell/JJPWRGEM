name: verify

on:
  pull_request:
    branches:
      - main
      - "**"
  push:
    branches:
      - main

env:
  RUSTFLAGS: "-Dwarnings"
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-mise
      - name: Configure Dependency Caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: just format-check

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-mise
      - run: mise install cargo:cargo-shear cargo:cargo-diet cargo:cargo-rdme cargo:tracey
      - name: Configure Dependency Caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: check unused dependencies
        run: cargo shear
      - name: verify publish contents
        run: just diet
      - run: just lint
      - run: just readmes-check
      - run: just package-json-check
      - run: just tracey-check

  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: ./.github/actions/setup-mise
      - run: mise install cargo:cargo-insta
      - name: Configure Dependency Caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: ./.github/actions/setup-node
      - name: build
        run: cargo build --release --verbose
      - name: test
        run: just test

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-mise
      - name: Configure Dependency Caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: publish dry-run (bytes2chars only)
        run: just publish-dry-run bytes2chars

  test-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: ./.github/actions/setup-mise
      - name: Configure Dependency Caching
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: just vscode-bin
      - uses: ./.github/actions/setup-node
      - run: /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 & echo "Started xvfb"
        shell: bash
      - run: pnpm --filter jjpwrgem-vscode test
        env:
          DISPLAY: ":99.0"
