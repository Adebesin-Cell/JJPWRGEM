pre-push:
  parallel: true
  jobs:
    - run: just lint
      glob: "*.rs"
    - run: just format-check
      glob:
        - "justfile"
        - "**/*.{rs,md,yml,ts,js}"
    - run: cargo shear
    - run: dist plan > /dev/null
    - run: just publish-dry-run bytes2chars
      glob: "crates/bytes2chars/**"
    - run: just readmes-check
    - run: just package-json-check
    - run: cargo test
      glob: "**/*.rs"

pre-commit:
  jobs:
    - run: just diet && git add ./crates/**/Cargo.toml Cargo.toml
    - run: just format
      glob:
        - "justfile"
        - "**/*.{rs,md,yml,ts,js}"
      stage_fixed: true
    - run: just readmes && git add "**/*.md" *.md
      glob:
        - "**/*.md"
        - "xtask/templates/**"
        - "crates/bytes2chars/src/**"
      stage_fixed: true
    - run: just package-json
      glob:
        - "xtask/"
        - "Cargo.toml"
        - "dist-workspace.toml"
