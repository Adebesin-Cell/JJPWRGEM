pre-push:
  parallel: true
  jobs:
    - run: mise run package-json-check && mise run format-check
    - run: mise run lint
      glob: "*.rs"
    - run: cargo shear
    - run: dist plan > /dev/null
    - run: mise run publish-dry-run bytes2chars
      glob: "crates/bytes2chars/**"
    - run: mise run readmes-check
    - run: mise run test
      glob: "**/*.rs"

pre-commit:
  jobs:
    - run: mise run diet && git add ./crates/**/Cargo.toml Cargo.toml
    - run: mise run format
      glob:
        - "**/*.{rs,md,yml,ts,js,json}"
      stage_fixed: true
    - run: mise run readmes && git add "**/*.md" *.md
      glob:
        - "**/*.md"
        - "xtask/templates/**"
        - "crates/bytes2chars/src/**"
      stage_fixed: true
    - run: mise run package-json
      glob:
        - "xtask/"
        - "Cargo.toml"
        - "dist-workspace.toml"
