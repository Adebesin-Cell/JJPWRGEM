# committed config. Conventional-commits with relaxed limits for this project.
style = "conventional"
subject_capitalized = false
subject_length = 100
line_length = 0
no_fixup = true
no_wip = true
merge_commit = true
allowed_types = [
  "fix",
  "feat",
  "chore",
  "docs",
  "refactor",
  "perf",
  "test",
  "bench",
  "deprecated",
]
