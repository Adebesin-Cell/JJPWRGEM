[tools]
actionlint = "1.7.12"
shellcheck = "0.11.0"
"cargo:cargo-deny" = "0.19.6"
"cargo:cargo-shear" = "1.11"
"cargo:cargo-diet" = "1.3.0"
"cargo:committed" = "1.1.11"
"cargo:tracey" = "1.3.0"
"cargo:typos-cli" = "1.46.2"
"npm:oxfmt" = "0.51.0"

[tasks.typos]
run = "typos"

[tasks.deny]
run = "cargo deny check"

[tasks.format]
run = [
  "cargo fmt --all",
  "oxfmt './**/*.{md,toml,yaml,yml,ts,js,json}' --write",
]

[tasks.format-check]
run = [
  "cargo fmt --all -- --check",
  "oxfmt './**/*.{md,toml,yaml,yml,ts,js,json}' --check",
]

[tasks.lint]
env = { RUSTFLAGS = "-Dwarnings" }
run = [
  "cargo clippy -q --all-targets --all-features --workspace",
  "pnpm --if-present lint > /dev/null",
  "actionlint",
]

[tasks.diet]
description = "Trim publishable crate dirs before release"
run = 'for x in ./crates/* ./xtask ./benches .; do [ -f "$x/Cargo.toml" ] || continue; (cd "$x" && cargo diet -q); done'

[tasks.package-check]
description = "check rust crates are ready to publish"
run = "cargo package -p bytes2chars -p jjpwrgem-parse -p jjpwrgem-ui -p jjpwrgem --allow-dirty"

[tasks.tracey-check]
description = "Verify spec rules have version bumps for any changed rule text"
run = "tracey pre-commit"
