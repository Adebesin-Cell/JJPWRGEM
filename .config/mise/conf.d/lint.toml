[tools]
actionlint = "1.7.12"
shellcheck = "0.11.0"
"cargo:cargo-deny" = "0.19.6"
"cargo:cargo-shear" = "1.11"
"cargo:cargo-diet" = "1.3.0"
"cargo:committed" = "1.1.11"
"cargo:tracey" = "1.3.0"
"cargo:typos-cli" = "1.46.2"
"npm:oxfmt" = "0.50.0"

[tasks.typos]
run = "typos"

[tasks.deny]
run = "cargo deny check"

[tasks.format]
description = "Format rust, markdown, toml, and config files"
run = [
  "cargo fmt --all",
  "oxfmt './**/*.{md,toml,yaml,yml,ts,js,json}' --write",
]

[tasks.format-check]
description = "Verify formatting is up-to-date"
run = [
  "cargo fmt --all -- --check",
  "oxfmt './**/*.{md,toml,yaml,yml,ts,js,json}' --check",
]

[tasks.lint]
description = "clippy, pnpm workspace lint, actionlint, and cargo shear"
env = { RUSTFLAGS = "-Dwarnings" }
run = [
  "cargo clippy -q --all-targets --all-features --workspace",
  "pnpm --if-present lint > /dev/null",
  "actionlint",
  "cargo shear",
  "find . -name '*.sh' -not -path '*/.git/*' -not -path '*/target/*' -not -path '*/node_modules/*' -not -path '*/conformance/*' | xargs shellcheck",
  "typos",
  "cargo deny check",
]

[tasks.diet]
description = "Trim publishable crate dirs before release"
run = 'for x in ./crates/* ./xtask ./benches .; do [ -f "$x/Cargo.toml" ] || continue; (cd "$x" && cargo diet -r -q); done'

[tasks.tracey-check]
description = "Verify spec rules have version bumps for any changed rule text"
run = "tracey pre-commit"
