[tasks.submodules]
description = "Initialize and update all git submodules"
run = "git submodule update --init --recursive"

[tasks.install]
description = "Install jjp to your cargo bin path"
run = "cargo install --path ."

[tasks.dev]
description = "Interactive dev loop (clippy/test/install/build via bacon TUI)"
run = "bacon"

[tasks.dev.tools]
"cargo:bacon" = "3.23.0"

[tasks.install-watch]
description = "Re-install jjp on every source change"
depends = ["install"]
run = "bacon install"

[tasks.install-watch.tools]
"cargo:bacon" = "3.23.0"

[tasks.vscode-test-linux]
depends = ["install"]
run = "xvfb-run -a pnpm --filter jjpwrgem-vscode test"
