[tasks.package-json]
description = "Regenerate package.json and shrinkwrap"
sources = ["xtask/src/**/*.rs", "Cargo.toml", "dist-workspace.toml"]
outputs = [
  "npm-packages/jjpwrgem/package.json",
  "npm-packages/jjpwrgem/npm-shrinkwrap.json",
]
run = [
  "cargo xtask generate-npm-package",
  "oxfmt npm-packages/jjpwrgem/package.json --write",
  "npm install --prefix npm-packages/jjpwrgem --ignore-scripts --no-fund",
  "npm shrinkwrap --prefix npm-packages/jjpwrgem",
]

[tasks.package-json.tools]
"npm:oxfmt" = "0.54.0"
