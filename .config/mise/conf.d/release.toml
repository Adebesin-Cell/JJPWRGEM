[tasks.release-notes]
description = "Print GitHub release notes from dist host JSON"
run = "dist host --steps=create --output-format=json | jq -r .announcement_github_body"

[tasks.release-notes.tools]
"cargo:cargo-dist" = "0.32.0"

[tasks.dist-plan]
run = "dist plan"

[tasks.dist-plan.tools]
"cargo:cargo-dist" = "0.32.0"
